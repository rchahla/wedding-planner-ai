<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wedding Planner AI</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:       #7a4f3a;
      --brand-dark:  #5e3b2a;
      --brand-light: #f5ede8;
      --accent:      #c9856a;
      --success:     #2d9c6e;
      --success-bg:  #edfaf4;
      --warning:     #d4780a;
      --warning-bg:  #fff8ed;
      --surface:     #ffffff;
      --bg:          #f8f4f1;
      --border:      #e8ddd5;
      --text:        #1a1a1a;
      --text-2:      #5a5a5a;
      --text-3:      #9a9a9a;
      --radius:      12px;
      --radius-sm:   8px;
      --shadow:      0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-mark {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--brand) 0%, var(--accent) 100%);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 16px; flex-shrink: 0;
    }

    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--brand);
      font-weight: 600;
    }

    .header-badge {
      margin-left: auto;
      background: var(--brand-light);
      color: var(--brand);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 56px 24px 40px;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--brand);
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .hero p {
      color: var(--text-2);
      font-size: 1.05rem;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── LAYOUT ── */
    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    /* ── FORM ── */
    .form-card {
      padding: 36px;
      margin-bottom: 28px;
    }

    .form-section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full-width { grid-column: 1 / -1; }

    label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: 0.02em;
    }

    .input-wrap { position: relative; }

    .input-icon {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      pointer-events: none;
      opacity: 0.5;
    }

    input, select {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.92rem;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      transition: border-color .15s, box-shadow .15s, background .15s;
      appearance: none;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--brand);
      background: var(--surface);
      box-shadow: 0 0 0 3px rgba(122,79,58,.1);
    }

    input::placeholder { color: var(--text-3); }

    .divider {
      grid-column: 1 / -1;
      height: 1px;
      background: var(--border);
      margin: 6px 0;
    }

    .checkbox-row {
      grid-column: 1 / -1;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: var(--brand-light);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
    }

    .checkbox-row input[type="checkbox"] {
      width: 16px; height: 16px;
      margin-top: 2px;
      accent-color: var(--brand);
      flex-shrink: 0;
      padding: 0;
    }

    .checkbox-row label {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--brand-dark);
      letter-spacing: 0;
      cursor: pointer;
      line-height: 1.5;
    }

    .btn-primary {
      grid-column: 1 / -1;
      padding: 13px 24px;
      background: linear-gradient(135deg, var(--brand) 0%, var(--accent) 100%);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity .15s, transform .1s, box-shadow .15s;
      box-shadow: 0 2px 8px rgba(122,79,58,.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }

    .btn-primary:hover:not(:disabled) {
      opacity: .92;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(122,79,58,.35);
    }

    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ── SKELETON ── */
    #skeleton { display: none; padding: 32px 36px; margin-bottom: 28px; }

    .skeleton-line {
      height: 14px;
      background: linear-gradient(90deg, #ede8e4 25%, #f5f0ec 50%, #ede8e4 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      margin-bottom: 12px;
    }

    .skeleton-line.w-60 { width: 60%; }
    .skeleton-line.w-80 { width: 80%; }
    .skeleton-line.w-40 { width: 40%; }
    .skeleton-line.h-20 { height: 20px; margin-bottom: 20px; }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── STATUS BANNER ── */
    .status-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      font-weight: 500;
      margin-bottom: 24px;
      animation: fadeSlideIn .3s ease;
    }

    .status-banner.success {
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid #a8e6cf;
    }

    /* ── OUTPUT PANEL ── */
    #output { display: none; animation: fadeSlideIn .4s ease; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #output.conflict .output-header {
      background: linear-gradient(135deg, #fff8ed, #fff3e0);
      border-bottom: 1px solid #f5d08a;
    }

    #output.success .output-header {
      background: linear-gradient(135deg, var(--success-bg), #d4f5e9);
      border-bottom: 1px solid #a8e6cf;
    }

    .output-header {
      padding: 20px 28px;
      border-radius: var(--radius) var(--radius) 0 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .output-header-icon { font-size: 22px; }

    .output-header-text h2 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }

    .output-header-text p { font-size: 0.82rem; color: var(--text-2); }

    .output-body { padding: 28px 32px; }

    /* ── BUDGET CHART ── */
    .chart-section {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 20px 24px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .chart-section h3 {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 14px;
    }

    .chart-wrap {
      width: 160px;
      height: 160px;
      flex-shrink: 0;
    }

    .chart-legend { flex: 1; min-width: 0; }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 0.82rem;
    }

    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-label { color: var(--text-2); flex: 1; }

    .legend-amount {
      font-weight: 600;
      color: var(--text);
      font-size: 0.82rem;
    }

    .legend-pct {
      color: var(--text-3);
      font-size: 0.75rem;
      width: 32px;
      text-align: right;
    }

    /* ── REPORT TYPOGRAPHY ── */
    .output-body h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--brand);
      margin-bottom: 4px;
      display: none;
    }

    .output-body h2 {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      margin: 28px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .output-body h3 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin: 16px 0 6px;
    }

    .output-body p {
      font-size: 0.92rem;
      line-height: 1.75;
      color: var(--text-2);
      margin-bottom: 12px;
    }

    .output-body ul, .output-body ol {
      padding-left: 20px;
      margin-bottom: 14px;
    }

    .output-body li {
      font-size: 0.92rem;
      line-height: 1.7;
      color: var(--text-2);
      margin-bottom: 6px;
    }

    .output-body strong { color: var(--text); font-weight: 600; }
    .output-body em { color: var(--text-3); font-size: 0.85rem; font-style: normal; }
    .output-body hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    #output.conflict .output-body strong {
      display: block;
      background: var(--warning-bg);
      border: 1px solid #f5d08a;
      border-left: 3px solid var(--warning);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-bottom: 12px;
      font-size: 0.88rem;
      color: var(--text);
      font-weight: 400;
    }

    /* ── CHAT ── */
    #chatSection {
      display: none;
      margin-top: 24px;
      animation: fadeSlideIn .4s ease;
    }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-header-icon {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--brand), var(--accent));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: white; flex-shrink: 0;
    }

    .chat-header-text h3 {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
    }

    .chat-header-text p {
      font-size: 0.78rem;
      color: var(--text-3);
      margin: 0;
    }

    #chatMessages {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 420px;
      overflow-y: auto;
    }

    .msg {
      display: flex;
      gap: 10px;
      animation: fadeSlideIn .2s ease;
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg.user .msg-avatar { background: var(--brand); color: white; }
    .msg.ai   .msg-avatar { background: var(--brand-light); color: var(--brand); }

    .msg-bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.88rem;
      line-height: 1.6;
    }

    .msg.user .msg-bubble {
      background: var(--brand);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg.ai .msg-bubble {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-2);
      border-bottom-left-radius: 4px;
    }

    .msg-bubble p { margin: 0; font-size: inherit; color: inherit; line-height: inherit; }
    .msg-bubble strong { color: inherit; }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
    }

    .typing-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-3);
      animation: typingBounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: .5; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }

    .chat-input-row {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }

    #chatInput {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 0.88rem;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      resize: none;
      transition: border-color .15s, box-shadow .15s;
    }

    #chatInput:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(122,79,58,.1);
    }

    #chatSendBtn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--brand), var(--accent));
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .15s, transform .1s;
      align-self: flex-end;
    }

    #chatSendBtn:hover:not(:disabled) { opacity: .85; transform: scale(1.05); }
    #chatSendBtn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── RESPONSIVE ── */
    @media (max-width: 560px) {
      .form-card { padding: 24px 20px; }
      .form-grid { grid-template-columns: 1fr; }
      .field.full-width, .checkbox-row, .btn-primary { grid-column: 1; }
      .output-body { padding: 20px; }
      .chart-section { flex-direction: column; gap: 16px; }
      .chart-wrap { width: 130px; height: 130px; margin: 0 auto; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo-mark">💍</div>
    <span class="logo-text">Wedding Planner AI</span>
    <span class="header-badge">AI-Powered</span>
  </header>

  <!-- HERO -->
  <div class="hero">
    <h1>Plan your perfect day</h1>
    <p>Enter your event details and get a personalised, AI-generated wedding plan in seconds.</p>
  </div>

  <div class="container">

    <!-- FORM -->
    <div class="card form-card">
      <p class="form-section-label">Event Details</p>
      <form id="planForm">
        <div class="form-grid">

          <div class="field">
            <label for="guests">Guest Count</label>
            <div class="input-wrap">
              <span class="input-icon">👥</span>
              <input type="number" id="guests" name="guests" placeholder="e.g. 90" min="1" required />
            </div>
          </div>

          <div class="field">
            <label for="budget">Budget (CAD $)</label>
            <div class="input-wrap">
              <span class="input-icon">💰</span>
              <input type="number" id="budget" name="budget" placeholder="e.g. 12000" min="0" required />
            </div>
          </div>

          <div class="field">
            <label for="theme">Theme</label>
            <div class="input-wrap">
              <span class="input-icon">🎨</span>
              <input type="text" id="theme" name="theme" placeholder="e.g. Rustic, Garden, Modern" />
            </div>
          </div>

          <div class="field">
            <label for="date">Event Date</label>
            <div class="input-wrap">
              <span class="input-icon">📅</span>
              <input type="date" id="date" name="date" />
            </div>
          </div>

          <div class="field">
            <label for="venue_type">Venue Type</label>
            <div class="input-wrap">
              <span class="input-icon">🏛️</span>
              <select id="venue_type" name="venue_type">
                <option value="">— Select venue type —</option>
                <option value="indoor">Indoor</option>
                <option value="outdoor">Outdoor</option>
                <option value="hybrid">Hybrid (Indoor + Outdoor)</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="dietary">Dietary Requirements</label>
            <div class="input-wrap">
              <span class="input-icon">🍽️</span>
              <input type="text" id="dietary" name="dietary" placeholder="e.g. Vegetarian, Halal" />
            </div>
          </div>

          <div class="divider"></div>

          <div class="field full-width">
            <label for="email">Email Address <span style="font-weight:400;color:var(--text-3);">— optional, receive your report by email</span></label>
            <div class="input-wrap">
              <span class="input-icon">✉️</span>
              <input type="email" id="email" name="email" placeholder="yourname@email.com" />
            </div>
          </div>

          <div class="checkbox-row">
            <input type="checkbox" id="acknowledged" name="acknowledged" />
            <label for="acknowledged">
              I have reviewed any flagged conflicts and want to proceed with my current inputs.
            </label>
          </div>

          <button type="submit" id="submitBtn" class="btn-primary">
            <span id="btnIcon">✨</span>
            <span id="btnText">Generate Wedding Plan</span>
          </button>

        </div>
      </form>
    </div>

    <!-- SKELETON LOADER -->
    <div class="card" id="skeleton">
      <div class="output-header" style="background:var(--bg); border-bottom:1px solid var(--border);">
        <div class="skeleton-line w-40 h-20" style="margin:0;"></div>
      </div>
      <div class="output-body">
        <div class="skeleton-line w-60 h-20"></div>
        <div class="skeleton-line w-80"></div>
        <div class="skeleton-line w-80"></div>
        <div class="skeleton-line w-60"></div>
        <br/>
        <div class="skeleton-line w-40 h-20"></div>
        <div class="skeleton-line w-80"></div>
        <div class="skeleton-line w-80"></div>
        <div class="skeleton-line w-40"></div>
      </div>
    </div>

    <!-- OUTPUT -->
    <div class="card" id="output">
      <div class="output-header">
        <span class="output-header-icon" id="outputIcon"></span>
        <div class="output-header-text">
          <h2 id="outputTitle"></h2>
          <p id="outputSubtitle"></p>
        </div>
      </div>
      <div class="output-body" id="outputBody"></div>
    </div>

    <!-- CHAT -->
    <div class="card" id="chatSection">
      <div class="chat-header">
        <div class="chat-header-icon">💬</div>
        <div class="chat-header-text">
          <h3>Ask a follow-up question</h3>
          <p>Ask anything about your plan, budget, vendors, or timeline</p>
        </div>
      </div>
      <div id="chatMessages"></div>
      <div class="chat-input-row">
        <textarea id="chatInput" rows="1" placeholder="e.g. Can you suggest vendors for a garden theme?"></textarea>
        <button id="chatSendBtn" title="Send">➤</button>
      </div>
    </div>

  </div>

  <script>
    const form        = document.getElementById('planForm');
    const output      = document.getElementById('output');
    const skeleton    = document.getElementById('skeleton');
    const submitBtn   = document.getElementById('submitBtn');
    const btnText     = document.getElementById('btnText');
    const btnIcon     = document.getElementById('btnIcon');
    const outputBody  = document.getElementById('outputBody');
    const chatSection = document.getElementById('chatSection');
    const chatMessages= document.getElementById('chatMessages');
    const chatInput   = document.getElementById('chatInput');
    const chatSendBtn = document.getElementById('chatSendBtn');

    let budgetChartInstance = null;

    // ── BUDGET CHART ──────────────────────────────────────────────
    const CHART_COLORS = ['#7a4f3a','#c9856a','#e8b89a','#f5d4be','#b8d4c0','#8cbfa0'];
    const CATEGORIES = [
      { label: 'Food & Venue',    pct: 0.52 },
      { label: 'Photography',     pct: 0.12 },
      { label: 'Flowers & Decor', pct: 0.10 },
      { label: 'Entertainment',   pct: 0.08 },
      { label: 'Contingency',     pct: 0.10 },
      { label: 'Other',           pct: 0.08 },
    ];

    function renderBudgetChart(budget) {
      if (budgetChartInstance) { budgetChartInstance.destroy(); budgetChartInstance = null; }

      const section = document.createElement('div');
      section.className = 'chart-section';

      const amounts = CATEGORIES.map(c => Math.round(budget * c.pct));

      // Legend
      const legend = document.createElement('div');
      legend.className = 'chart-legend';
      const legendTitle = document.createElement('h3');
      legendTitle.textContent = 'Budget Breakdown';
      legend.appendChild(legendTitle);

      CATEGORIES.forEach((cat, i) => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `
          <div class="legend-dot" style="background:${CHART_COLORS[i]}"></div>
          <span class="legend-label">${cat.label}</span>
          <span class="legend-amount">$${amounts[i].toLocaleString()}</span>
          <span class="legend-pct">${Math.round(cat.pct * 100)}%</span>
        `;
        legend.appendChild(item);
      });

      // Canvas
      const wrap = document.createElement('div');
      wrap.className = 'chart-wrap';
      const canvas = document.createElement('canvas');
      wrap.appendChild(canvas);

      section.appendChild(wrap);
      section.appendChild(legend);

      budgetChartInstance = new Chart(canvas, {
        type: 'doughnut',
        data: {
          labels: CATEGORIES.map(c => c.label),
          datasets: [{
            data: amounts,
            backgroundColor: CHART_COLORS,
            borderWidth: 2,
            borderColor: '#ffffff',
            hoverOffset: 6,
          }]
        },
        options: {
          cutout: '68%',
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ` $${ctx.parsed.toLocaleString()} (${Math.round(ctx.parsed / budget * 100)}%)`
              }
            }
          }
        }
      });

      return section;
    }

    // ── LOADING STATE ─────────────────────────────────────────────
    function setLoading(on) {
      skeleton.style.display = on ? 'block' : 'none';
      output.style.display   = 'none';
      chatSection.style.display = 'none';
      submitBtn.disabled     = on;
      btnText.textContent    = on ? 'Generating…' : 'Generate Wedding Plan';
      btnIcon.textContent    = on ? '⏳' : '✨';
    }

    // ── PLAN FORM ─────────────────────────────────────────────────
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const params = new URLSearchParams({
        guests:       document.getElementById('guests').value,
        budget:       document.getElementById('budget').value,
        theme:        document.getElementById('theme').value,
        date:         document.getElementById('date').value,
        venue_type:   document.getElementById('venue_type').value,
        dietary:      document.getElementById('dietary').value,
        email:        document.getElementById('email').value,
        acknowledged: document.getElementById('acknowledged').checked ? 'true' : 'false'
      });

      output.className = 'card';
      chatMessages.innerHTML = '';
      setLoading(true);

      try {
        const res  = await fetch(`/plan?${params}`);
        const data = await res.json();
        setLoading(false);

        const isConflict = data.has_conflicts;
        output.classList.add(isConflict ? 'conflict' : 'success');

        document.getElementById('outputIcon').textContent     = isConflict ? '⚠️' : '✅';
        document.getElementById('outputTitle').textContent    = isConflict ? 'Action Required' : 'Your Wedding Plan is Ready';
        document.getElementById('outputSubtitle').textContent = isConflict
          ? 'Please resolve the following issues before your plan can be generated.'
          : 'Review your personalised planning report below.';

        outputBody.innerHTML = '';

        if (!isConflict && data.emailed) {
          const emailVal = document.getElementById('email').value;
          const banner = document.createElement('div');
          banner.className = 'status-banner success';
          banner.innerHTML = `<span>📬</span><span>Report also sent to <strong>${emailVal}</strong></span>`;
          outputBody.appendChild(banner);
        }

        // Budget chart (success only)
        if (!isConflict) {
          const budget = parseInt(document.getElementById('budget').value, 10);
          if (budget > 0) {
            outputBody.appendChild(renderBudgetChart(budget));
          }
        }

        const content = document.createElement('div');
        content.innerHTML = marked.parse(data.report);
        outputBody.appendChild(content);

        output.style.display = 'block';

        // Show chat only on success
        if (!isConflict) {
          chatSection.style.display = 'block';
        }

        output.scrollIntoView({ behavior: 'smooth', block: 'start' });

      } catch (err) {
        setLoading(false);
        output.classList.add('conflict');
        document.getElementById('outputIcon').textContent     = '❌';
        document.getElementById('outputTitle').textContent    = 'Something went wrong';
        document.getElementById('outputSubtitle').textContent = 'Check the Flask console for details.';
        outputBody.innerHTML = '';
        output.style.display = 'block';
      }
    });

    // ── CHAT ──────────────────────────────────────────────────────
    function appendMessage(role, text) {
      const msg = document.createElement('div');
      msg.className = `msg ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = role === 'user' ? '👤' : '💍';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.innerHTML = marked.parse(text);

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      chatMessages.appendChild(msg);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return msg;
    }

    function appendTyping() {
      const msg = document.createElement('div');
      msg.className = 'msg ai';
      msg.id = 'typingIndicator';

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = '💍';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble typing-indicator';
      bubble.innerHTML = `<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>`;

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      chatMessages.appendChild(msg);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function sendChatMessage() {
      const text = chatInput.value.trim();
      if (!text) return;

      chatInput.value = '';
      chatInput.style.height = 'auto';
      chatSendBtn.disabled = true;

      appendMessage('user', text);
      appendTyping();

      try {
        const res  = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();

        document.getElementById('typingIndicator')?.remove();

        if (data.error) {
          appendMessage('ai', `Sorry, I couldn't answer that. Please try again.`);
        } else {
          appendMessage('ai', data.response);
        }
      } catch {
        document.getElementById('typingIndicator')?.remove();
        appendMessage('ai', 'Something went wrong. Please try again.');
      }

      chatSendBtn.disabled = false;
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    chatSendBtn.addEventListener('click', sendChatMessage);

    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendChatMessage();
      }
    });

    // Auto-resize textarea
    chatInput.addEventListener('input', () => {
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
    });
  </script>
</body>
</html>
